<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Construction</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* HERO */
.hero {
  background: url('https://i.ibb.co/JWwmpfvP/IMG-4778') center/cover no-repeat;
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}
.hero h1 {
  font-size: 40px;
}
.hero button {
  padding: 12px 25px;
  border: none;
  background: orange;
  color: white;
  cursor: pointer;
}

/* PRODUCTS */
.products {
  padding: 20px;
}
.carousel {
  display: flex;
  overflow-x: auto;
  gap: 15px;
}
.card {
  min-width: 200px;
  border: 1px solid #ddd;
  padding: 10px;
}
.card img {
  width: 100%;
}
.card button {
  background: green;
  color: white;
  border: none;
  padding: 8px;
  width: 100%;
}

/* CART */
.cart-icon {
  position: fixed;
  top: 20px;
  right: 20px;
  background: black;
  color: white;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
}
.cart {
  position: fixed;
  right: -300px;
  top: 0;
  width: 300px;
  height: 100%;
  background: white;
  transition: 0.3s;
  padding: 15px;
  overflow-y: auto;
}
.cart.active {
  right: 0;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: green;
  color: white;
  padding: 12px;
  border-radius: 50%;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>The Construction</h1>
    <p>Fresh Finds, Best Prices</p>
    <button onclick="scrollToProducts()">Shop Now</button>
  </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="products">
  <h2>Products</h2>
  <div class="carousel">

    <div class="card">
      <img src="https://i.ibb.co/YF5Svmwd/IMG-4768">
      <h3>Product 1</h3>
      <p>₹500</p>
      <button onclick="addToCart('Product 1',500)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://i.ibb.co/m53sHvpK/IMG-4769">
      <h3>Product 2</h3>
      <p>₹600</p>
      <button onclick="addToCart('Product 2',600)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://i.ibb.co/tTxk2HnR/IMG-4770">
      <h3>Product 3</h3>
      <p>₹700</p>
      <button onclick="addToCart('Product 3',700)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://i.ibb.co/7x80zTwK/IMG-4771">
      <h3>Product 4</h3>
      <p>₹800</p>
      <button onclick="addToCart('Product 4',800)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://i.ibb.co/1tYZrFZf/IMG-4772">
      <h3>Product 5</h3>
      <p>₹900</p>
      <button onclick="addToCart('Product 5',900)">Add to Cart</button>
    </div>

  </div>
</div>

<!-- CART ICON -->
<div class="cart-icon" onclick="toggleCart()">
🛒 <span id="count">0</span>
</div>

<!-- CART -->
<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <ul id="cartItems"></ul>

  <input type="text" id="name" placeholder="Your Name"><br><br>
  <input type="text" id="phone" placeholder="Phone Number"><br><br>

  <button onclick="sendOrder()">Send Order</button>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/9830486067" target="_blank">💬</a>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("YOUR_PUBLIC_KEY");

let cart = [];

function scrollToProducts() {
  document.getElementById('products').scrollIntoView({behavior:'smooth'});
}

function addToCart(name, price) {
  cart.push({name, price});
  document.getElementById('count').innerText = cart.length;
  displayCart();
}

function toggleCart() {
  document.getElementById('cart').classList.toggle('active');
}

function displayCart() {
  let list = document.getElementById('cartItems');
  list.innerHTML = "";
  cart.forEach(item => {
    let li = document.createElement('li');
    li.innerText = item.name + " - ₹" + item.price;
    list.appendChild(li);
  });
}

function sendOrder() {
  let name = document.getElementById('name').value;
  let phone = document.getElementById('phone').value;

  let items = cart.map(i => i.name + " ₹" + i.price).join(", ");

  emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
    customer_name: name,
    phone: phone,
    order: items,
    to_email: "theconstructiongmail.com"
  }).then(()=>{
    alert("Order Sent!");
    cart = [];
    displayCart();
    document.getElementById('count').innerText = 0;
  });
}
</script>

</body>
</html>
